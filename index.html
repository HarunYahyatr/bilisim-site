<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>habun</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

<style>
/* GENEL */
body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Poppins', sans-serif;
  background-color: #121212;
  color: #e0e0e0;
  text-align: center;
  padding: 20px;
  box-sizing: border-box;
}

/* ORTA KUTU */
.overlay {
  background: #1e1e1e;
  padding: 50px;
  border-radius: 15px;
  box-shadow: 0 0 20px rgba(0,0,0,0.8);
  max-width: 400px;
  width: 100%;
}

/* BAŞLIK */
h1 {
  font-size: 42px;
  margin-bottom: 10px;
  animation: fadeIn 2s ease;
}

/* PARAGRAF */
p {
  opacity: 0.7;
  margin-bottom: 20px;
}

/* BUTON */
.btn {
  display: inline-block;
  padding: 15px 30px;
  font-size: 18px;
  color: #fff;
  text-decoration: none;
  border-radius: 10px;
  background: linear-gradient(45deg, #bb86fc, #3700b3);
  transition: 0.3s;
  box-shadow: 0 0 10px rgba(187, 134, 252, 0.7);
  font-weight: 600;
  letter-spacing: 1px;
  animation: pulse 3s infinite;
}

/* HOVER */
.btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px rgba(187, 134, 252, 1);
}

/* ANİMASYONLAR */
@keyframes fadeIn {
  from {opacity: 0; transform: translateY(-20px);}
  to {opacity: 1; transform: translateY(0);}
}

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

/* MOBİL UYUMLU (TELEFON) */
@media (max-width: 480px) {
  h1 { font-size: 32px; }
  p { font-size: 16px; }
  .overlay { padding: 30px; }
  .btn { padding: 12px 20px; font-size: 16px; }
}
</style>
</head>

<body>

<div class="overlay">
  <h1>slm cnm👋🏿</h1>
  <p>fıri robux😈</p>

  <a class="btn" href="https://www.canva.com/design/DAHCLSl7-1Q/X9cwMsZ1AMAiFIG46M-2qw/edit?utm_content=DAHCLSl7-1Q&utm_campaign=designshare&utm_medium=link2&utm_source=sharebutton" target="_blank">
    GIMME ROBAX
  </a>
</div>

</body>
</html>
